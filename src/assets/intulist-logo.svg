<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <!-- Icon - Circular design with dots and lines -->
  <g transform="translate(5, 5)">
    <!-- Outer gray circle -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="#9ca3af" stroke-width="3"/>
    
    <!-- Middle gray circle -->
    <circle cx="20" cy="20" r="10" fill="none" stroke="#9ca3af" stroke-width="2"/>
    
    <!-- Center blue dot -->
    <circle cx="20" cy="20" r="4" fill="#3b82f6"/>
    
    <!-- Blue dots on the circles -->
    <circle cx="20" cy="2" r="3" fill="#3b82f6"/>
    <circle cx="35" cy="28" r="3" fill="#3b82f6"/>
    
    <!-- Connection lines -->
    <line x1="20" y1="20" x2="20" y2="5" stroke="#3b82f6" stroke-width="2"/>
    <line x1="20" y1="20" x2="32" y2="26" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- Text - INTULIST -->
  <text x="55" y="32" font-family="Arial, sans-serif" font-size="22" font-weight="600">
    <!-- INTU in gray -->
    <tspan fill="#6b7280">INTU</tspan>
    <!-- LIST in blue -->
    <tspan fill="#3b82f6">LIST</tspan>
  </text>
</svg>