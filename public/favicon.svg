<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#ffffff"/>
  
  <!-- Icon - Circular design centered -->
  <g transform="translate(16, 16)">
    <!-- Outer gray circle -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#9ca3af" stroke-width="2.5"/>
    
    <!-- Middle gray circle -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    
    <!-- Center blue dot -->
    <circle cx="0" cy="0" r="3" fill="#3b82f6"/>
    
    <!-- Blue dots on the circles -->
    <circle cx="0" cy="-12" r="2" fill="#3b82f6"/>
    <circle cx="10" cy="6" r="2" fill="#3b82f6"/>
  </g>
</svg>